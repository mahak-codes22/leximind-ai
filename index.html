        // ==========================================
        // DYNAMIC AUTHENTICATION MODAL (FULLY UNLOCKED BYPASS)
        // ==========================================
        function AuthModal({ isOpen, onClose, onAuthSuccess, registeredUsers, onRegisterUser }) {
          const [isSignUp, setIsSignUp] = React.useState(false);
          const [email, setEmail] = React.useState('');
          const [password, setPassword] = React.useState('');
          const [name, setName] = React.useState('');
          const [regSuccessMsg, setRegSuccessMsg] = React.useState(false);

          React.useEffect(() => {
            const handleToggle = (e) => {
              setIsSignUp(e.detail.signUp);
              setRegSuccessMsg(false);
            };
            window.addEventListener('openAuthModal', handleToggle);
            return () => window.removeEventListener('openAuthModal', handleToggle);
          }, []);

          if (!isOpen) return null;

          const handleSubmit = (e) => {
            e.preventDefault();
            if (isSignUp) {
              if (!name.trim() || !email.trim() || !password.trim()) return;
              onRegisterUser({ name: name.trim(), email: email.trim().toLowerCase(), password: password, role: 'Associate Counsel' });
              setRegSuccessMsg(true);
              setIsSignUp(false);
              setName('');
            } else {
              if (!email.trim() || !password.trim()) return;
              const foundUser = registeredUsers.find(u => u.email === email.trim().toLowerCase());
              onAuthSuccess({ name: foundUser ? foundUser.name : (email.split('@')[0].toUpperCase()), email: email.trim(), role: foundUser ? foundUser.role : 'Senior Legal Counsel' });
              setRegSuccessMsg(false);
              onClose();
            }
          };

          return (
            <div className="fixed inset-0 bg-black/70 backdrop-blur-md flex items-center justify-center z-50 p-4">
              <div className="bg-[#121214] border border-[#27272a] rounded-xl max-w-sm w-full p-6 space-y-4 relative shadow-2xl">
                <button onClick={() => { onClose(); setRegSuccessMsg(false); }} className="absolute top-4 right-4 text-zinc-500 hover:text-zinc-300 transition-colors">✕</button>
                <div className="text-center">
                  <h3 className="text-lg font-bold text-white">{isSignUp ? 'Create Account' : 'Sign in'}</h3>
                  <p className="text-zinc-500 text-xs mt-1">{isSignUp ? 'Sign up to build legal repositories' : 'Enter authorized credentials to unlock telemetry'}</p>
                </div>
                {regSuccessMsg && (
                  <div className="bg-emerald-950/30 border border-emerald-500/20 text-emerald-400 text-[11px] p-2.5 rounded-lg text-center font-medium">
                    ✓ Registration Complete! Please Sign In with the exact account now.
                  </div>
                )}
                <form onSubmit={handleSubmit} className="space-y-3.5 pt-1">
                  {isSignUp && (
                    <div>
                      <label className="text-[11px] text-zinc-400 font-medium block mb-1">Full Name</label>
                      <input type="text" value={name} onChange={e => setName(e.target.value)} placeholder="Alex Corporate" className="w-full bg-[#1c1c1f] text-xs text-white p-2.5 rounded-lg border border-zinc-800 focus:outline-none focus:border-cyan-500" required />
                    </div>
                  )}
                  <div>
                    <label className="text-[11px] text-zinc-400 font-medium block mb-1">Corporate Email</label>
                    <input type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="counsel@company.com" className="w-full bg-[#1c1c1f] text-xs text-white p-2.5 rounded-lg border border-zinc-800 focus:outline-none focus:border-cyan-500" required />
                  </div>
                  <div>
                    <label className="text-[11px] text-zinc-400 font-medium block mb-1">Security Vault Password</label>
                    <input type="password" value={password} onChange={e => setPassword(e.target.value)} placeholder="••••••••••••" className="w-full bg-[#1c1c1f] text-xs text-white p-2.5 rounded-lg border border-zinc-800 focus:outline-none focus:border-cyan-500" required />
                  </div>
                  <button type="submit" className="w-full text-white py-2.5 rounded-lg text-xs font-semibold transition-all shadow-md mt-2" style={{background:'linear-gradient(135deg,#0891b2,#059669)'}}>
                    {isSignUp ? 'Register' : 'Sign In'}
                  </button>
                </form>
                <div className="text-center pt-2 text-xs border-t border-zinc-900 text-zinc-500">
                  {isSignUp ? 'Already have Account?' : "Don't have an account?"}{' '}
                  <button type="button" onClick={() => { setIsSignUp(!isSignUp); setRegSuccessMsg(false); }} className="text-cyan-400 hover:underline font-medium">
                    {isSignUp ? 'Sign In' : 'Register'}
                  </button>
                </div>
              </div>
            </div>
          );
        }

                </p>
                <div className="flex justify-center gap-4 mb-10">

                    <span className="transform group-hover:translate-x-1 transition-transform">→</span>

                {/* FIX: Reduced vertical padding in stats section */}

                    <h3 className="text-2xl sm:text-3xl font-extrabold font-mono" style={{color:'#06b6d4'}}>99.4%</h3>

        function LandingFeatures() {
          const cards = [
            { icon: "📥", title: "Instant Contract Ingestion", desc: "Drag and drop standard PDF, TXT, or DOCX legal documents to automatically scan and catalog files cleanly into your repository." },
            { icon: "🔍", title: "Automated Risk Discovery", desc: "Instantly flags asymmetrical notice terms, hidden liability constraints, and data protection gaps within contracts." },

          return (
            <section id="features" className="py-20 bg-[#09090b] border-t border-zinc-900 relative z-10">

        function AuthModal({ isOpen, onClose, onAuthSuccess, registeredUsers, onRegisterUser }) {
          const [isSignUp, setIsSignUp] = React.useState(false);
          const [email, setEmail] = React.useState('');
          const [password, setPassword] = React.useState('');
          const [name, setName] = React.useState('');
          const [regSuccessMsg, setRegSuccessMsg] = React.useState(false);

          React.useEffect(() => {
            const handleToggle = (e) => {
              setIsSignUp(e.detail.signUp);
              setRegSuccessMsg(false);
            };
            window.addEventListener('openAuthModal', handleToggle);
            return () => window.removeEventListener('openAuthModal', handleToggle);
          }, []);

          if (!isOpen) return null;

          const handleSubmit = (e) => {
            e.preventDefault();
            if (isSignUp) {
              if (!name.trim() || !email.trim() || !password.trim()) return;
              onRegisterUser({ name: name.trim(), email: email.trim().toLowerCase(), password: password, role: 'Associate Counsel' });
              setRegSuccessMsg(true);
              setIsSignUp(false);
              setName('');
            } else {
              if (!email.trim() || !password.trim()) return;
              const foundUser = registeredUsers.find(u => u.email === email.trim().toLowerCase());
              onAuthSuccess({ name: foundUser ? foundUser.name : (email.split('@')[0].toUpperCase()), email: email.trim(), role: foundUser ? foundUser.role : 'Senior Legal Counsel' });
              setRegSuccessMsg(false);
              onClose();
            }
          };

          return (
            <div className="fixed inset-0 bg-black/70 backdrop-blur-md flex items-center justify-center z-50 p-4">
              <div className="bg-[#121214] border border-[#27272a] rounded-xl max-w-sm w-full p-6 space-y-4 relative shadow-2xl">
                <button onClick={() => { onClose(); setRegSuccessMsg(false); }} className="absolute top-4 right-4 text-zinc-500 hover:text-zinc-300 transition-colors">✕</button>
                <div className="text-center">
                  <h3 className="text-lg font-bold text-white">{isSignUp ? 'Create Account' : 'Sign in'}</h3>
                  <p className="text-zinc-500 text-xs mt-1">{isSignUp ? 'Sign up to build legal repositories' : 'Enter authorized credentials to unlock telemetry'}</p>
                </div>
                {regSuccessMsg && (
                  <div className="bg-emerald-950/30 border border-emerald-500/20 text-emerald-400 text-[11px] p-2.5 rounded-lg text-center font-medium">
                    ✓ Registration Complete! Please Sign In with the exact account now.
                  </div>
                )}
                <form onSubmit={handleSubmit} className="space-y-3.5 pt-1">
                  {isSignUp && (
                    <div>
                      <label className="text-[11px] text-zinc-400 font-medium block mb-1">Full Name</label>
                      <input type="text" value={name} onChange={e => setName(e.target.value)} placeholder="Alex Corporate" className="w-full bg-[#1c1c1f] text-xs text-white p-2.5 rounded-lg border border-zinc-800 focus:outline-none focus:border-cyan-500" required />
                    </div>
                  )}
                  <div>
                    <label className="text-[11px] text-zinc-400 font-medium block mb-1">Corporate Email</label>
                    <input type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="counsel@company.com" className="w-full bg-[#1c1c1f] text-xs text-white p-2.5 rounded-lg border border-zinc-800 focus:outline-none focus:border-cyan-500" required />
                  </div>
                  <div>
                    <label className="text-[11px] text-zinc-400 font-medium block mb-1">Security Vault Password</label>
                    <input type="password" value={password} onChange={e => setPassword(e.target.value)} placeholder="••••••••••••" className="w-full bg-[#1c1c1f] text-xs text-white p-2.5 rounded-lg border border-zinc-800 focus:outline-none focus:border-cyan-500" required />
                  </div>
                  <button type="submit" className="w-full text-white py-2.5 rounded-lg text-xs font-semibold transition-all shadow-md mt-2" style={{background:'linear-gradient(135deg,#0891b2,#059669)'}}>
                    {isSignUp ? 'Register' : 'Sign In'}
                  </button>
                </form>
                <div className="text-center pt-2 text-xs border-t border-zinc-900 text-zinc-500">
                  {isSignUp ? 'Already have Account?' : "Don't have an account?"}{' '}
                  <button type="button" onClick={() => { setIsSignUp(!isSignUp); setRegSuccessMsg(false); }} className="text-cyan-400 hover:underline font-medium">
                    {isSignUp ? 'Sign In' : 'Register'}
                  </button>
                </div>
              </div>
            </div>
          );
        }

                  <p className="text-[11px] text-zinc-500">Upload agreements to index them into the Vertex AI Vector DB cluster.</p>
                </div>
                <input type="file" ref={fileInputRef} className="hidden" accept=".pdf,.txt,.doc,.docx" onChange={(e) => processFile(e.target.files[0])} />
                <div onClick={() => fileInputRef.current.click()} onDragOver={(e) => e.preventDefault()} onDrop={(e) => { e.preventDefault(); processFile(e.dataTransfer.files[0]); }}
                  className="border border-dashed border-zinc-800 hover:border-cyan-500/50 bg-[#161619]/40 rounded-xl p-6 flex flex-col items-center justify-center gap-2 cursor-pointer transition-all text-center">
                  <Icons.UploadCloud />
                  <p className="text-xs text-zinc-300 font-medium hover:text-cyan-400 transition-colors">Drag & drop local files here, or click to browse</p>
                  <p className="text-[10px] text-zinc-500">Supports PDF, TXT, DOCX. Live OCR parsing active.</p>
                </div>
                {isUploading && (
                  <div className="bg-[#18181b] border border-zinc-800/60 rounded-lg p-3">
                    <div className="flex items-center justify-between text-[11px] mb-1.5">
                      <div className="flex items-center gap-2 text-zinc-300 min-w-0">
                        <Icons.RefreshCw className="animate-spin w-3 h-3 flex-shrink-0" style={{color:'#06b6d4'}} />
                        <span className="font-medium truncate">{currentUploadingName}</span>
                      </div>
                      <span className="text-zinc-400 font-mono ml-2">{uploadProgress}%</span>
                    </div>
                    <div className="w-full bg-zinc-900 h-1 rounded-full overflow-hidden">
                      <div className="h-full rounded-full transition-all duration-150" style={{ width: `${uploadProgress}%`, background:'linear-gradient(90deg,#0891b2,#059669)' }}></div>
                    </div>
                  </div>
                )}
              </div>
              <div className="bg-[#121214] border border-[#27272a] rounded-xl overflow-hidden shadow-sm w-full">
                <div className="p-4 border-b border-[#27272a] flex items-center justify-between flex-wrap gap-2">
                  <h3 className="text-xs font-semibold text-zinc-200">Active Document Repository</h3>
                  {searchQuery && <span className="text-[10px] px-2 py-0.5 rounded font-mono truncate" style={{background:'rgba(6,182,212,0.1)', color:'#06b6d4', border:'1px solid rgba(6,182,212,0.2)'}}>Filtering: "{searchQuery}"</span>}
                </div>
                <div className="divide-y divide-[#27272a] overflow-x-auto w-full">
                  {filteredDocs.length > 0 ? (
                    filteredDocs.map((doc) => (
                      <div key={doc.id} className="p-3.5 flex items-center justify-between hover:bg-[#161619]/60 transition-colors group min-w-[280px]">
                        <div className="flex items-center gap-3 min-w-0">
                          <Icons.FileText />
                          <div className="min-w-0">
                            <p className="text-xs font-medium text-zinc-200 truncate max-w-[180px] sm:max-w-xs">{doc.name}</p>
                            <p className="text-[10px] text-zinc-500">{doc.size} • {doc.date}</p>
                          </div>
                        </div>
                        <div className="flex items-center gap-2 flex-shrink-0 ml-2">
                          {doc.status === 'Indexed' && <span className="text-[10px] bg-emerald-950/30 text-emerald-400 border border-emerald-900/40 px-2 py-0.5 rounded-md font-medium">Indexed</span>}
                          {doc.status === 'Failed' && <span className="text-[10px] bg-rose-950/30 text-rose-400 border border-rose-900/40 px-2 py-0.5 rounded-md font-medium">Failed</span>}
                          <button onClick={() => onDeleteDoc(doc.id, doc.name)} className="text-zinc-600 hover:text-rose-400 text-xs px-2 transition-colors">✕</button>
                        </div>
                      </div>
                    ))
                  ) : (
                    <div className="p-8 text-center text-zinc-500 text-xs italic">No matching files indexed in the active vector space.</div>
                  )}
                </div>
              </div>
            </div>
          );
        }

        function ChatPanel({ selectedModel, isStandalone }) {
          const [messages, setMessages] = React.useState([
            { sender: 'user', text: 'What are the key risks in this contract?', time: '1:52 PM' },
            { sender: 'ai', text: 'Based on my analysis of the uploaded Master Services Agreement via the Vertex AI pipeline, I have identified the following critical legal risks:', bullets: ['Termination clause requires an asymmetrical 90-day notice.', 'Vendor liability cap is undefined and open to uncapped damages.', 'No explicit data retention limitation found post contract termination.'], time: '1:52 PM' }
          ]);
          const [inputMessage, setInputMessage] = React.useState('');
          const [isTyping, setIsTyping] = React.useState(false);

          const handleSend = (userText) => {
            if (!userText.trim()) return;
            setMessages(prev => [...prev, { sender: 'user', text: userText, time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) }]);
            setInputMessage('');
            setIsTyping(true);
            setTimeout(() => {
              setIsTyping(false);
              setMessages(prev => [...prev, { sender: 'ai', text: `Query processed using ${selectedModel}. Node parameters verified completely.`, time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) }]);
            }, 1100);
          };

          return (
            <div className={`bg-[#121214] border border-[#27272a] rounded-xl flex flex-col overflow-hidden shadow-sm w-full ${isStandalone ? 'h-[calc(100vh-11rem)]' : 'h-[500px] xl:h-[calc(100vh-15.5rem)]'}`}>
              <div className="p-4 border-b border-[#27272a] bg-[#161619] flex items-center justify-between">
                <div className="flex items-center gap-2">
                  <span className="inline-block w-1.5 h-1.5 rounded-full animate-pulse" style={{background:'#06b6d4'}}></span>
                  <span className="text-xs font-semibold text-zinc-200">Gemini Review Engine</span>
                </div>
                <span className="text-[10px] font-mono px-2 py-0.5 rounded border" style={{color:'#06b6d4', background:'rgba(6,182,212,0.1)', borderColor:'rgba(6,182,212,0.2)'}}>{selectedModel}</span>
              </div>
              <div className="flex-1 overflow-y-auto p-4 space-y-4">
                {messages.map((msg, i) => (
                  <div key={i} className={`flex flex-col ${msg.sender === 'user' ? 'items-end' : 'items-start'}`}>
                    <div className={`text-xs p-3.5 rounded-xl max-w-[90%] border ${msg.sender === 'user' ? 'text-white rounded-br-none' : 'bg-[#18181b] border-zinc-800 text-zinc-200 rounded-bl-none'}`}
                      style={msg.sender === 'user' ? {background:'linear-gradient(135deg,#0891b2,#059669)', borderColor:'#0891b2'} : {}}>
                      <p className="leading-relaxed">{msg.text}</p>
                      {msg.bullets && (
                        <ul className="mt-2.5 space-y-1.5 list-disc pl-4 text-zinc-300 border-t border-zinc-800/80 pt-2">
                          {msg.bullets.map((b, idx) => <li key={idx} style={{markerColor:'#06b6d4'}}>{b}</li>)}
                        </ul>
                      )}
                    </div>
                  </div>
                ))}
                {isTyping && (
                  <div className="flex items-center gap-2 text-[10px] text-zinc-500 bg-zinc-900/40 px-3 py-2 border border-zinc-800 rounded-lg w-max animate-pulse">
                    <Icons.RefreshCw className="animate-spin w-3 h-3" style={{color:'#06b6d4'}} />
                    <span>Gemini processing token sequences...</span>
                  </div>
                )}
              </div>
              <div className="p-3 bg-[#161619] border-t border-[#27272a] flex gap-2 items-center mt-auto">
                <button className="text-zinc-500 hover:text-zinc-300 px-1"><Icons.Paperclip /></button>
                <input type="text" value={inputMessage} onChange={(e) => setInputMessage(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && handleSend(inputMessage)} placeholder="Ask Gemini to extract clauses..." className="w-full bg-[#1c1c1f] text-xs text-zinc-200 p-2.5 rounded-lg border border-zinc-800 focus:outline-none focus:border-cyan-500" />
                <button onClick={() => handleSend(inputMessage)} className="text-white p-2.5 rounded-lg text-xs font-medium transition-all shadow-md" style={{background:'linear-gradient(135deg,#0891b2,#059669)'}}><Icons.Send /></button>
              </div>
            </div>
          );
        }

        function AnalyticsView() {
          return (
            <div className="bg-[#121214] border border-[#27272a] rounded-xl p-6 space-y-4 shadow-sm w-full">
              <div>
                <h3 className="text-sm font-semibold text-zinc-200">System Performance Telemetry</h3>
                <p className="text-xs text-zinc-500">Live operational monitoring of your deployed Vertex AI container models.</p>
              </div>
              <div className="h-48 border border-zinc-800 bg-zinc-900/30 rounded-xl flex items-end p-4 gap-2 justify-around">
                {[45, 60, 32, 75, 90, 65, 85, 50, 95, 70].map((h, i) => (
                  <div key={i} className="w-full rounded-t" style={{ height: `${h}%`, background:`linear-gradient(to top, #0891b2, #059669)` }}></div>
                ))}
              </div>
            </div>
          );
        }

        function SettingsView({ selectedModel, setSelectedModel }) {
          return (
            <div className="bg-[#121214] border border-[#27272a] rounded-xl p-5 sm:p-6 space-y-5 shadow-sm w-full">
              <div>
                <h3 className="text-sm font-semibold text-zinc-200">Global Engine Configurations</h3>
                <p className="text-xs text-zinc-500">Configure your security boundaries and pipeline weights.</p>
              </div>
              <div className="space-y-4 divide-y divide-zinc-800/60">
                <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-2 pt-2">
                  <label className="text-xs font-medium text-zinc-300 block">Default LLM Orchestrator</label>
                  <select value={selectedModel} onChange={(e) => setSelectedModel(e.target.value)} className="bg-zinc-900 border border-zinc-800 text-xs rounded-lg p-2 text-zinc-300 w-full sm:w-auto">
                    <option value="Gemini 1.5 Pro">Gemini 1.5 Pro</option>
                    <option value="Gemini Flash">Gemini Flash</option>
                  </select>
                </div>
              </div>
            </div>
          );
        }

        // ==========================================
        // MAIN ROUTER ORCHESTRATOR
        // ==========================================
        function App() {
          const [viewMode, setViewMode] = React.useState('landing');
          const [isAuthOpen, setIsAuthOpen] = React.useState(false);
          const [registeredUsers, setRegisteredUsers] = React.useState([{ name: 'Navin Kukreja', email: 'counsel@leximind.ai', password: 'password123', role: 'Senior Legal Counsel' }]);
          const [user, setUser] = React.useState({ name: 'Navin Kukreja', email: 'counsel@leximind.ai', role: 'Senior Legal Counsel' });
          const [activeTab, setActiveTab] = React.useState('Dashboard');
          const [selectedModel, setSelectedModel] = React.useState('Gemini 1. Pro');
          const [isMobileSidebarOpen, setIsMobileSidebarOpen] = React.useState(false);
          const [showProfileModal, setShowProfileModal] = React.useState(false);
          const [searchQuery, setSearchQuery] = React.useState('');
          const [isUploading, setIsUploading] = React.useState(false);
          const [uploadProgress, setUploadProgress] = React.useState(0);
          const [currentUploadingName, setCurrentUploadingName] = React.useState('');
          const [notifications, setNotifications] = React.useState([
            { id: 1, text: "System initialized context credentials mapping.", time: "10 mins ago", type: "create", read: false },
            { id: 2, text: "Data_Processing_Addendum_v4.pdf text layers parsed.", time: "1 hr ago", type: "create", read: true }
          ]);
          const [documents, setDocuments] = React.useState([
            { id: 1, name: 'MSLA_Vendor_Agreement_2026.pdf', size: '2.4 MB', date: 'May 24, 2026', status: 'Indexed' },
            { id: 2, name: 'Data_Processing_Addendum_v4.pdf', size: '1.1 MB', date: 'May 25, 2026', status: 'Indexed' },
            { id: 3, name: 'NDA_Executive_Search_Draft.pdf', size: '420 KB', date: 'May 26, 2026', status: 'Failed' },
          ]);

          const handleNewAuthTrigger = (signUpRequested) => {
            setIsAuthOpen(true);
            setTimeout(() => { window.dispatchEvent(new CustomEvent('openAuthModal', { detail: { signUp: signUpRequested } })); }, 50);
          };

          const handleRegisterUser = (newUserData) => { setRegisteredUsers(prev => [...prev, newUserData]); };
          const handleAuthSuccess = (userData) => { setUser(userData); setViewMode('app'); };

          const handleNewUpload = (meta) => {
            if (isUploading) return;
            setCurrentUploadingName(meta.name);
            setIsUploading(true);
            setUploadProgress(0);
            const interval = setInterval(() => {
              setUploadProgress((oldProgress) => {
                if (oldProgress >= 100) {
                  clearInterval(interval);
                  setIsUploading(false);
                  setDocuments(prev => [{ id: Date.now(), name: meta.name, size: meta.size, date: meta.date, status: 'Indexed' }, ...prev]);
                  setNotifications(prev => [{ id: Date.now(), text: `${meta.name} indexed cleanly.`, time: "Just Now", type: "create", read: false }, ...prev]);
                  return 100;
                }
                return oldProgress + 20;
              });
            }, 100);
          };

          const handleDeleteDocument = (id, name) => {
            setDocuments(prev => prev.filter(doc => doc.id !== id));
            setNotifications(prev => [{ id: Date.now(), text: `${name} deleted from indexes.`, time: "Just Now", type: "delete", read: false }, ...prev]);
          };

          if (viewMode === 'landing') {
            return (
              <React.Fragment>
                <LandingPage onTriggerAuth={handleNewAuthTrigger} />
                <AuthModal isOpen={isAuthOpen} onClose={() => setIsAuthOpen(false)} onAuthSuccess={handleAuthSuccess} registeredUsers={registeredUsers} onRegisterUser={handleRegisterUser} />
              </React.Fragment>
            );
          }

          return (
            <div className="min-h-screen bg-[#09090b] text-[#fafafa] flex overflow-hidden w-full relative">
              <Sidebar activeUser={user} activeTab={activeTab} setActiveTab={setActiveTab} docCount={documents.length} isMobileOpen={isMobileSidebarOpen} setIsMobileOpen={setIsMobileSidebarOpen} onProfileClick={() => setShowProfileModal(true)} onBackToLanding={() => setViewMode('landing')} />
              <div className="flex-1 flex flex-col min-w-0 overflow-hidden h-screen">
                <Header activeUser={user} selectedModel={selectedModel} setSelectedModel={setSelectedModel} onToggleSidebar={() => setIsMobileSidebarOpen(true)} onProfileClick={() => setShowProfileModal(true)} notifications={notifications} setNotifications={setNotifications} searchQuery={searchQuery} setSearchQuery={setSearchQuery} />
                <main className="flex-1 overflow-y-auto p-4 lg:p-6 space-y-6 w-full">
                  {activeTab === 'Dashboard' && (
                    <div className="grid grid-cols-1 xl:grid-cols-12 gap-6 items-start w-full">
                      <div className="xl:col-span-12 w-full"><MetricsGrid /></div>
                      <div className="xl:col-span-7 w-full"><DocumentWorkbench documents={documents} onUploadStart={handleNewUpload} isUploading={isUploading} uploadProgress={uploadProgress} currentUploadingName={currentUploadingName} onDeleteDoc={handleDeleteDocument} searchQuery={searchQuery} /></div>
                      <div className="xl:col-span-5 space-y-4 w-full"><ChatPanel selectedModel={selectedModel} isStandalone={false} /></div>
                    </div>
                  )}
                  {activeTab === 'Documents' && (<div className="max-w-4xl mx-auto w-full"><DocumentWorkbench documents={documents} onUploadStart={handleNewUpload} isUploading={isUploading} uploadProgress={uploadProgress} currentUploadingName={currentUploadingName} onDeleteDoc={handleDeleteDocument} searchQuery={searchQuery} /></div>)}
                  {activeTab === 'AI Chat' && (<div className="max-w-4xl mx-auto w-full"><ChatPanel selectedModel={selectedModel} isStandalone={true} /></div>)}
                  {activeTab === 'Analytics' && (<div className="max-w-4xl mx-auto space-y-6 w-full"><MetricsGrid /><AnalyticsView /></div>)}
                  {activeTab === 'Settings' && (<div className="max-w-2xl mx-auto w-full"><SettingsView selectedModel={selectedModel} setSelectedModel={setSelectedModel} /></div>)}
                </main>
              </div>

              {showProfileModal && (
                <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                  <div className="bg-[#121214] border border-[#27272a] rounded-xl max-w-sm w-full p-6 space-y-4 relative">
                    <button onClick={() => setShowProfileModal(false)} className="absolute top-4 right-4 text-zinc-500 hover:text-zinc-300 transition-colors">✕</button>
                    <div className="flex items-center gap-3">
                      <div className="w-12 h-12 rounded-full flex items-center justify-center font-bold text-sm text-white" style={{background:'linear-gradient(135deg,#0891b2,#059669)'}}>
                        {user.name.split(' ').map(n => n[0]).join('').toUpperCase()}
                      </div>
                      <div>
                        <h4 className="font-semibold text-zinc-100 text-sm">{user.name}</h4>
                        <p className="text-xs text-zinc-500">{user.role}</p>
                      </div>
                    </div>
                    <div className="bg-zinc-900/60 rounded-lg p-3 border border-zinc-800 text-[11px] font-mono space-y-1.5 text-zinc-400">
                      <div><span className="text-zinc-500">Authorized Node:</span> {user.email}</div>
                      <div><span className="text-zinc-500">Security Access:</span> Tier-1 Dynamic Session</div>
                    </div>
                    <button onClick={() => { setViewMode('landing'); setShowProfileModal(false); }} className="w-full bg-rose-950/40 hover:bg-rose-900/30 border border-rose-900/40 text-rose-400 py-2.5 rounded-lg text-xs font-semibold transition-colors">Sign Out</button>
                  </div>
                </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
